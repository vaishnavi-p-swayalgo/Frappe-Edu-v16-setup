# =============================================================
#  Host Nginx config — playground.swayalgo.com
#  Place at: /etc/nginx/sites-available/playground.swayalgo.com
#  Then: sudo ln -s /etc/nginx/sites-available/playground.swayalgo.com \
#               /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#        sudo certbot --nginx -d playground.swayalgo.com
# =============================================================

server {
    listen 80;
    server_name playground.swayalgo.com;

    # Certbot will add SSL block below this automatically
    # after: sudo certbot --nginx -d playground.swayalgo.com

    client_max_body_size 50m;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    location /socket.io {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 600;
    }
}